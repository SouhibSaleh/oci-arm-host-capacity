name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.3']
    name: integration-tests (PHP ${{ matrix.php-versions }})
    steps:
      - uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
      - name: Validate composer.json and composer.lock
        run: composer validate
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.php-versions }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.php-versions }}-composer-
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress
      - name: Load secrets and write private key
        run: |
          echo "${{ secrets.sec1 }}" > /tmp/env_file
          while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_ENV
          done < /tmp/env_file
          grep 'OCI_PRIVATE_KEY=' /tmp/env_file | cut -d'=' -f2- > /tmp/oci_private.pem
          chmod 600 /tmp/oci_private.pem
          echo "OCI_PRIVATE_KEY_FILENAME=/tmp/oci_private.pem" >> $GITHUB_ENV
      - name: Run test suite
        run: vendor/bin/phpunit --color tests/
